name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-amd64:
    name: Test (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -v -race -timeout=10m ./...

      - name: Run tests with coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
        continue-on-error: true

  test-arm64:
    name: Test (arm64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify ARM64 CPU features
        run: |
          echo "=== CPU Info ==="
          cat /proc/cpuinfo | head -30
          echo ""
          echo "=== Feature Detection ==="
          if grep -q "sve" /proc/cpuinfo; then
            echo "✓ SVE is supported"
          else
            echo "○ SVE is NOT supported (NEON-only)"
          fi
          if grep -q "asimd" /proc/cpuinfo; then
            echo "✓ NEON (asimd) is supported"
          fi

      - name: Run tests
        run: go test -v -race -timeout=10m ./...

      - name: Run benchmarks
        run: go test -bench=. -benchmem -count=3 -run=^$ ./...

  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run fuzz tests
        run: |
          # Use exact match (^name$) to avoid matching multiple tests
          for fuzz in $(go test -list='Fuzz.*' ./... 2>/dev/null | grep '^Fuzz'); do
            echo "Running $fuzz for 30s..."
            go test -fuzz="^${fuzz}$" -fuzztime=30s ./...
          done

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run
